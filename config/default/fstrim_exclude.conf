###############################################################################
# FSTRIM Exclusion Patterns
#
# VMs matching any pattern in this file will skip pre-backup FSTRIM.
# Uses bash pattern matching (glob patterns, not regex).
#
# Why exclude a VM from FSTRIM?
#   - Database servers: TRIM can cause latency spikes on write-heavy workloads
#     (e.g. PostgreSQL, MySQL with O_DIRECT)
#   - Legacy guest OS or drivers: older Windows guests (<= Win 7) or outdated
#     VirtIO drivers may not handle guest-fstrim correctly
#   - Filesystems that do not support TRIM: XFS on older kernels, ZFS, ext2,
#     or any filesystem mounted without discard support
#   - Raw or passthrough disks: TRIM has no effect on raw block devices
#   - Known QEMU agent issues: VMs where guest-fstrim hangs or returns errors
#
# VMs without a QEMU guest agent are already skipped automatically — this file
# is for VMs that *have* an agent but should still be excluded.
#
# SCHEMA VERSION: 1.0 (2026-03-21)
###############################################################################

###############################################################################
# EXCLUSION PATTERNS
#
# Format: One pattern per line
#
# Pattern syntax:
#   *        - Matches any characters
#   ?        - Matches single character
#   [abc]    - Matches any character in brackets
#   [!abc]   - Matches any character NOT in brackets
###############################################################################

# Database servers — TRIM can cause latency spikes under heavy I/O
# db-prod-pg
# db-reporting-*

# Legacy Windows guests with outdated VirtIO drivers
# legacy-win7-*

# VMs with known guest agent issues
# old-centos6

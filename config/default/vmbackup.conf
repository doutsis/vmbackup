#################################################################################
# VMBackup Configuration - TEMPLATE
#
# Copy this template to create a new configuration instance:
#   cp -r config/template config/<instance_name>
#   Edit config/<instance_name>/vmbackup.conf
#
# Usage: ./vmbackup.sh --config-instance <instance_name>
#
# NOTE: Only settings you want to OVERRIDE need to be included here.
#       Omitted settings will use defaults from vmbackup.sh
#
# SCHEMA VERSION: 3.1 (2026-02-01)
#################################################################################

#################################################################################
# BACKUP PATH (REQUIRED)
#
# Where backups are stored. Each instance should have a unique path.
# Structure: $BACKUP_PATH/<vm_name>/<YYYYMM>/
#
# *** YOU MUST CREATE THIS DIRECTORY BEFORE THE FIRST RUN ***
# vmbackup will NOT create it — the backup session will abort if it
# does not exist or is not writable.
#
# Create the directory:
#   sudo mkdir -p /path/to/backups
#
# vmbackup will automatically apply SGID (root:backup 2750) on first
# run so all new files/dirs inherit the backup group.
#
#################################################################################

BACKUP_PATH="/path/to/backups/"

#################################################################################
# PRIORITY SETTINGS
#
# Control how "polite" the backup process is to other system tasks.
# Higher priority = faster backups but more impact on running VMs.
#################################################################################

# CPU Priority (nice level): -20=highest, 0=normal, 19=lowest
# Recommended: 10 (production), 0 (test/dedicated backup window)
# Default: 10
#PROCESS_PRIORITY=10

# I/O Priority Class (ionice -c):
#   1 = Realtime (use with caution - can starve other I/O)
#   2 = Best-effort (normal, respects nice level)
#   3 = Idle (only when disk is idle - very slow)
# Default: 2
#IO_PRIORITY_CLASS=2

# I/O Priority Level (ionice -n): 0-7 (only applies to class 2)
#   0 = highest priority within class
#   4 = normal
#   7 = lowest priority within class
# Default: 5
#IO_PRIORITY_LEVEL=5

#################################################################################
# COMPRESSION SETTINGS
#################################################################################

# virtnbdbackup compression level (LZ4 fast vs LZ4 HC)
#
# LZ4 has TWO distinct algorithms selected by level number:
#
#   LZ4 fast (levels 1-2):
#     Single hash-table lookup per position. Designed for speed.
#     Compresses at 500-1000+ MiB/s with minimal CPU cost.
#     Levels 1-2 are functionally near-identical.
#
#   LZ4 HC — High Compression (levels 3-16):
#     Hash-chain searching for longer matches. Fundamentally different
#     algorithm — NOT just a stronger setting of LZ4 fast.
#     10-30x slower than fast mode. Higher levels search deeper chains.
#     For VM disk data, ratio is virtually identical to fast mode
#     (1.31x vs 1.30x) so the extra CPU time buys almost nothing.
#
# Benchmark results (real full backups):
#   Level 16: Linux VM 24:45 (7.5 MiB/s)  | Windows VM 30:45 (17.2 MiB/s)
#   Level  8: Linux VM 09:12 (20.4 MiB/s) | Windows VM 27:50 (19.0 MiB/s)
#   Level  4: Linux VM 08:10 (23.0 MiB/s) | Windows VM 27:42 (19.1 MiB/s)
#   Compression ratio: identical across all levels (~1.30x)
#
# WARNING: Level 0 crashes virtnbdbackup <= 2.28 (Python truthiness bug
#          in disk.py — 'if args.compress:' treats 0 as False).
#          If set to 0, vmbackup.sh will automatically use 1 instead.
#
# Recommended: 4 (minimum HC, tested, good balance)
# Default: 4
#VIRTNBD_COMPRESS_LEVEL=4

#################################################################################
# ROTATION POLICIES
#
# Rotation policy determines when old backups are removed:
#   daily     - Keep N days of backups
#   weekly    - Keep N weeks of backups
#   monthly   - Keep N months of backups (default)
#   accumulate - Never auto-delete, manual cleanup only
#   never     - Skip this VM entirely (exclude from backups)
#################################################################################

# Default rotation policy for VMs not specified in vm_overrides.conf
# Default: monthly
#DEFAULT_ROTATION_POLICY="monthly"

#################################################################################
# RETENTION SETTINGS
#
# How many backup periods to keep (depends on rotation policy)
#################################################################################

# Number of daily backups to retain (for daily policy)
# Default: 7
#RETENTION_DAYS=7

# Number of weekly backups to retain (for weekly policy)
# Default: 4
#RETENTION_WEEKS=4

# Number of monthly backups to retain (for monthly policy)
# Default: 3
#RETENTION_MONTHS=3

#################################################################################
# ORPHANED POLICY RETENTION
#
# When a VM's rotation policy changes (e.g., weekly → monthly), old period
# directories from the previous policy become "orphaned" - invisible to the
# current policy's count-based retention. These settings control age-based
# cleanup of orphaned directories.
#################################################################################

# Enable orphan retention cleanup (true/false)
# Set to false to accumulate orphans indefinitely
# Default: true
#RETENTION_ORPHAN_ENABLED="true"

# Maximum age (days) before orphaned period directories are deleted
# Orphans older than this are removed regardless of their original policy
# Default: 90 (allows time for policy rollback decisions)
#RETENTION_ORPHAN_MAX_AGE_DAYS=90

# Minimum age (days) before orphans become eligible for cleanup
# Protects recently-orphaned directories during policy transitions
# Default: 7 (safety buffer to catch policy mistakes)
#RETENTION_ORPHAN_MIN_AGE_DAYS=7

# Dry run orphan cleanup (log actions but don't delete)
# Set to true for testing before enabling actual cleanup
# Default: false
#RETENTION_ORPHAN_DRY_RUN="false"

#################################################################################
# ACCUMULATE MODE SETTINGS
#
# For VMs with rotation_policy="accumulate" (never auto-delete)
#################################################################################

# Log warning when checkpoint count exceeds this depth
# Default: 100
#ACCUMULATE_WARN_DEPTH=30

# Archive chain and force fresh full backup when checkpoint count exceeds this
# Default: 365
#ACCUMULATE_HARD_LIMIT=60

#################################################################################
# CHECKPOINT MANAGEMENT
#################################################################################

# Day of month to force full backup (resets checkpoint chain)
# Default: 1 (first day of each month)
#CHECKPOINT_FORCE_FULL_ON_DAY=1

# Validate checkpoint chain integrity before each incremental backup.
# If a checkpoint is missing or corrupt, the backup can recover automatically
# (see ENABLE_AUTO_RECOVERY_ON_CHECKPOINT_CORRUPTION below).
#   yes = Validate before every incremental (recommended)
#   no  = Skip validation — faster, but corruption is not detected until backup fails
# Default: yes
CHECKPOINT_HEALTH_CHECK="yes"

#################################################################################
# LOGGING & NOTIFICATIONS
#################################################################################

# Log directory (relative paths are relative to script directory)
# Default: logs
#LOG_DIR="logs"

# Log level: ERROR, WARN, INFO, DEBUG
# ERROR  = Errors only (quietest)
# WARN   = Errors and warnings
# INFO   = Normal operation logging (default for production)
# DEBUG  = Verbose debugging (useful for troubleshooting)
# Default: INFO
LOG_LEVEL="INFO"

# Email reports are configured in email.conf (not here)

#################################################################################
# ADVANCED SETTINGS
#################################################################################

# How many times to retry a failed VM backup before giving up.
# On each retry, vmbackup converts from incremental to full if the
# incremental attempt failed. Set to 0 to disable retries.
# Default: 3
MAX_RETRIES=3

# Scratch directory for virtnbdbackup temporary files
# Default: /var/tmp
#VIRTNBD_SCRATCH_DIR="/var/tmp"

#################################################################################
# FSTRIM OPTIMIZATION
#
# Trims unused blocks in guest VMs before backup to reduce backup size.
# Requires QEMU guest agent running in VM.
#
# WARNING: If these settings are missing, defaults will be used with explicit
# log warnings. Set them explicitly to avoid unexpected behavior.
#################################################################################

# Enable automatic fstrim before backups
# true  = Run guest-fstrim via QEMU agent before backup (reduces size)
# false = Skip fstrim (faster backup start, larger files)
# DEFAULT IF MISSING: true
ENABLE_FSTRIM=true

# Minimum contiguous free range to trim on Linux guests (bytes)
# Ranges smaller than this are skipped — reduces TRIM I/O with minimal space trade-off.
# Has no effect on Windows guests (Windows ignores this parameter).
# 0 = trim every free block (slowest, most thorough)
# 1048576 (1 MB) = good balance of speed and thoroughness
# DEFAULT IF MISSING: 1048576
FSTRIM_MINIMUM=1048576

# Timeout for fstrim on Linux guests (seconds)
# DEFAULT IF MISSING: 300
FSTRIM_TIMEOUT=300

# Timeout for fstrim on Windows guests (seconds)
# Windows VirtIO VMs need discard_granularity=32M XML fix for fast TRIM (~1-2s)
# Without the fix, trim can take 8-15 minutes — this timeout is the safety net
# DEFAULT IF MISSING: 600
FSTRIM_WINDOWS_TIMEOUT=600

# FSTRIM exclusion file — VMs matching patterns in this file skip FSTRIM.
# Path is relative to the instance config directory.
# DEFAULT IF MISSING: fstrim_exclude.conf (if file exists, patterns are loaded)
FSTRIM_EXCLUDE_FILE="fstrim_exclude.conf"

#################################################################################
# OFFLINE VM OPTIMIZATION
#
# Skip backing up offline VMs that haven't changed since last backup.
#################################################################################

# Skip backup if offline VM disks haven't changed
# true  = Check disk modification time, skip if unchanged (faster)
# false = Always backup offline VMs (more consistent)
# DEFAULT IF MISSING: true (skip unchanged offline VMs)
SKIP_OFFLINE_UNCHANGED_BACKUPS=true

# Detect change if disk modified in last N seconds (0=disable)
# Prevents false-positives from filesystem time resolution
# DEFAULT IF MISSING: 60
OFFLINE_CHANGE_DETECTION_THRESHOLD=60

#################################################################################
# CHECKPOINT RECOVERY
#
# How to handle corrupted virtnbdbackup checkpoint chains.
#################################################################################

# What to do when checkpoint corruption is detected.
#   yes  = Delete corrupted checkpoints and force a full backup (self-healing)
#   warn = Log the error with remediation steps but fail the backup
#   no   = Fail immediately
# Default: yes
ENABLE_AUTO_RECOVERY_ON_CHECKPOINT_CORRUPTION="yes"

#################################################################################
# REPLICATION SETTINGS
#
# Controls how backups are replicated to other storage locations.
# Replication destinations are configured in:
#   - replication_local.conf (local/SSH/SMB to NAS or remote servers)
#   - replication_cloud.conf (SharePoint, Backblaze, etc. via rclone)
#################################################################################

# When to run local vs cloud replication
# Values:
#   simultaneous  = Run local and cloud in parallel (fastest)
#   local_first   = Complete local before starting cloud
#   cloud_first   = Complete cloud before starting local (rare)
# DEFAULT IF MISSING: "simultaneous"
#REPLICATION_ORDER="simultaneous"

#################################################################################
# STATE BACKUP SETTINGS
#
# Daily snapshots of _state/ directory for disaster recovery.
#################################################################################

# Days to keep state file backups (tar.gz)
# Default: 90
#STATE_BACKUP_KEEP_DAYS=90

# Days to keep live log files before cleanup
# Logs are captured in state backups before deletion
# Set to 0 to disable log cleanup
# Default: 30
#LOG_KEEP_DAYS=30

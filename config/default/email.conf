#!/bin/bash
#################################################################################
# Email Configuration for vmbackup.sh
#
# TEMPLATE FILE - Copy to config/<instance>/email.conf and customize
#
# This file configures email report delivery after backup operations.
# Requires msmtp configured at /etc/msmtprc for actual sending.
#
# Prerequisites:
#   1. Install msmtp: apt install msmtp msmtp-mta
#   2. Configure /etc/msmtprc with your SMTP server
#   3. Test: echo "test" | msmtp recipient@example.com
#
# Usage: Auto-sourced by email_report_module.sh
#
# Version: 1.0
#################################################################################

#=============================================================================
# EMAIL ENABLE/DISABLE
#=============================================================================

# Master enable/disable for email reports
# Set to "no" to skip sending email reports entirely
EMAIL_ENABLED="no"

#=============================================================================
# RECIPIENT SETTINGS
#=============================================================================

# Primary recipient email address
# For multiple recipients, use comma-separated: "user1@example.com,user2@example.com"
EMAIL_RECIPIENT="admin@example.com"

# Sender email address (must be valid for your SMTP config)
# This should match what's configured in /etc/msmtprc
EMAIL_SENDER="backups@example.com"

#=============================================================================
# EMAIL CONTENT SETTINGS
#=============================================================================

# Hostname to display in email subject and body
# Leave empty to use system hostname: $(hostname)
EMAIL_HOSTNAME=""

# Subject line prefix (appears before status)
# Full subject will be: "[prefix] Backup Report - hostname - status"
EMAIL_SUBJECT_PREFIX="[VM Backup]"

#=============================================================================
# CONDITIONAL SENDING
#=============================================================================

# Send email report on successful backups?
# "yes" = Always send on success
# "no"  = Only send if there were failures or warnings
EMAIL_ON_SUCCESS="yes"

# Send email report on backup failures?
# "yes" = Send report when backups fail (recommended)
# "no"  = Skip email even on failures (not recommended)
EMAIL_ON_FAILURE="yes"

# Include replication status in email?
# "yes" = Include local and cloud replication summaries
# "no"  = Only show backup results
EMAIL_INCLUDE_REPLICATION="yes"

# Include disk space summary?
# "yes" = Show backup storage usage and available space
# "no"  = Omit disk space information
EMAIL_INCLUDE_DISK_SPACE="yes"

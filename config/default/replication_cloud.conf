#!/bin/bash
#################################################################################
# Cloud Replication Configuration for vmbackup.sh
#
# Manages replication to cloud storage providers (SharePoint, Backblaze, etc.)
# via rclone. Runs after local backup completes.
#
# Version: 1.1
#################################################################################

#=============================================================================
# GLOBAL CLOUD REPLICATION SETTINGS
#=============================================================================

# Master enable/disable for all cloud replication
# Set to "yes" and configure at least one destination below to enable
CLOUD_REPLICATION_ENABLED="no"

# What to replicate (applies to ALL cloud destinations unless overridden):
# "everything"       - All backups, chains, incrementals, configs (default)
# "archives-only"    - Only .archives/ directories (consolidated chains)
# "monthly"          - Only end-of-month snapshots (1st of next month)
CLOUD_REPLICATION_SCOPE="everything"

# Sync mode (applies to ALL cloud destinations unless overridden):
# "mirror"           - Exact replica of local (recommended - uses rclone sync)
#                       Remote matches local exactly, deleted files removed from cloud
#                       Provider version history provides recovery if needed
# "accumulate-all"   - Upload everything, never delete (uses rclone copy)
#                       Orphaned files accumulate on cloud over time
# "accumulate-valid" - Only upload validated backups, never delete
#                       Same as accumulate-all but validates checksums first
CLOUD_REPLICATION_SYNC_MODE="mirror"

# On cloud replication failure:
# "continue" - Log error, continue to next destination (default)
# "abort"    - Stop all cloud replication
CLOUD_REPLICATION_ON_FAILURE="continue"

# Rate limiting and throttling:
CLOUD_REPLICATION_DEFAULT_BWLIMIT="0"        # KB/s (0=unlimited, full speed)
CLOUD_REPLICATION_THROTTLE_ON_429="yes"      # Auto-reduce speed on rate limit
CLOUD_REPLICATION_THROTTLE_FACTOR="0.5"      # Reduce to 50% on each 429 error
CLOUD_REPLICATION_THROTTLE_MIN="1000"        # Minimum 1 MB/s

# Retry logic:
CLOUD_REPLICATION_MAX_RETRIES="3"            # Retry failed uploads
CLOUD_REPLICATION_RETRY_DELAY="60"           # Seconds between retries
CLOUD_REPLICATION_RESUME_PARTIAL="auto"      # "auto", "delete", "keep"

# Logging (cloud replication logs to vmbackup's main log):
# Override log level for cloud-specific verbosity (optional):
#CLOUD_REPLICATION_LOG_LEVEL="debug"         # debug, info, warn, error

# Credential/Token Expiry Tracking:
CLOUD_REPLICATION_TRACK_EXPIRY="yes"         # Track credential expiry dates
CLOUD_REPLICATION_EXPIRY_WARN_DAYS="30"      # Warn this many days before expiry
CLOUD_REPLICATION_EXPIRY_CRITICAL_DAYS="7"   # Critical alert this many days before

# Lock file to prevent concurrent cloud replication:
CLOUD_REPLICATION_USE_LOCKFILE="yes"
CLOUD_REPLICATION_LOCKFILE="/var/run/cloud_replication.lock"
CLOUD_REPLICATION_LOCK_TIMEOUT="3600"        # Seconds before stale lock is broken

# Post-upload verification:
# "none"     - Trust rclone succeeded (fastest)
# "size"     - Verify file sizes match (fast, catches most issues)
# "checksum" - Full integrity verification after upload (safest, +15-20% time)
CLOUD_REPLICATION_POST_VERIFY="checksum"

# Per-VM exclusions (comma-separated list of VM names to skip):
# Leave empty to replicate all VMs
CLOUD_REPLICATION_VM_EXCLUDE=""

# Parallel vs sequential destination processing:
# "sequential" - Process one destination at a time (default, less bandwidth contention)
# "parallel"   - Process all destinations simultaneously (faster, more bandwidth)
CLOUD_REPLICATION_DEST_MODE="sequential"

# Dry-run mode for testing:
# Validates authentication, connectivity, and permissions without uploading
CLOUD_REPLICATION_DRY_RUN="no"

#=============================================================================
# CLOUD DESTINATION DEFINITIONS
#
# Each cloud destination is numbered (CLOUD_DEST_1, CLOUD_DEST_2, etc.)
# Processed in numerical order.
#
# Common settings:
#   CLOUD_DEST_N_ENABLED       - "yes" or "no"
#   CLOUD_DEST_N_NAME          - Human-readable name for logs/reports
#   CLOUD_DEST_N_PROVIDER      - "sharepoint", "backblaze", "wasabi", etc.
#   CLOUD_DEST_N_REMOTE        - rclone remote name (e.g., "sharepoint:")
#   CLOUD_DEST_N_PATH          - Path within the remote (e.g., "VMBackups")
#   CLOUD_DEST_N_SCOPE         - Override global scope (optional, empty = global)
#   CLOUD_DEST_N_SYNC_MODE     - Override global sync mode (optional, empty = global)
#   CLOUD_DEST_N_BWLIMIT       - KB/s bandwidth limit (0=unlimited)
#   CLOUD_DEST_N_VERIFY        - Override global verification (optional, empty = global)
#   CLOUD_DEST_N_SECRET_EXPIRY - When credentials expire (YYYY-MM-DD)
#=============================================================================

#-----------------------------------------------------------------------------
# Cloud Destination 1: SharePoint Online Example
#
# *** SECURITY NOTE: rclone config contains OAuth tokens ***
# The rclone config file (/root/.config/rclone/rclone.conf) stores
# access/refresh tokens. It should remain root:root 600 (rclone's default).
# vmbackup runs as root, so it reads root's rclone config automatically.
#
# SharePoint has THREE layers of configurability:
#   1. SharePoint Site URL   — chosen during 'rclone config' interactive setup
#   2. Document Library      — chosen during 'rclone config' (stored as drive_id)
#   3. Folder within library — set here via CLOUD_DEST_1_PATH
#
# The rclone remote (e.g., "sharepoint:") stores the site URL and library.
# CLOUD_DEST_1_PATH controls which folder WITHIN that library to use.
# Different instances can share the same rclone remote but use different folders
# (e.g., production → "VMBackups", dev → "DEVBackups").
#
# Prerequisites:
#   1. Install rclone: apt install rclone
#   2. Run the auth helper: sudo ./cloud_transports/sharepoint_auth.sh
#      - Or manually: rclone config → onedrive → sharepoint → device code flow
#      - You will choose your SharePoint site URL and document library here
#   3. Test access: rclone lsd sharepoint:
#
# Re-authentication:
#   Refresh token valid 90 days (auto-renewed on each use).
#   Re-run sharepoint_auth.sh if server is idle 90+ days.
#   Use --instance to auto-read settings: sharepoint_auth.sh --instance dev
#-----------------------------------------------------------------------------
#CLOUD_DEST_1_ENABLED="no"
#CLOUD_DEST_1_NAME="sharepoint-backup"
#CLOUD_DEST_1_PROVIDER="sharepoint"
#CLOUD_DEST_1_REMOTE="sharepoint:"
#CLOUD_DEST_1_PATH="VMBackups"
#CLOUD_DEST_1_SCOPE=""                          # Use global (everything)
#CLOUD_DEST_1_SYNC_MODE=""                      # Use global (mirror)
#CLOUD_DEST_1_BWLIMIT="0"                       # Unlimited, throttle on 429
#CLOUD_DEST_1_VERIFY=""                         # Use global

#-----------------------------------------------------------------------------
# Cloud Destination 2: Backblaze B2 Example (disabled)
#
# Prerequisites:
#   1. Create B2 bucket in Backblaze console
#   2. Create application key with read/write access
#   3. Configure rclone: rclone config
#      - Choose "b2" type
#      - Enter account ID and application key
#-----------------------------------------------------------------------------
#CLOUD_DEST_2_ENABLED="no"
#CLOUD_DEST_2_NAME="backblaze-b2"
#CLOUD_DEST_2_PROVIDER="backblaze"
#CLOUD_DEST_2_REMOTE="b2:"
#CLOUD_DEST_2_PATH="vmbackups"
#CLOUD_DEST_2_SCOPE="archives-only"             # Only consolidated chains
#CLOUD_DEST_2_SYNC_MODE=""                      # Use global
#CLOUD_DEST_2_BWLIMIT="5000"                    # 5 MB/s
#CLOUD_DEST_2_VERIFY="checksum"
#CLOUD_DEST_2_SECRET_EXPIRY=""                  # Backblaze keys don't expire by default

#=============================================================================
# END OF CONFIGURATION
#=============================================================================

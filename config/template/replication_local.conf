#!/bin/bash
#################################################################################
# Local Replication Configuration for vmbackup.sh
#
# Configures rsync-based replication to local, NFS, or SSH destinations.
# Runs after backup session completes (batch mode).
#
# Version: 1.1
#################################################################################

#=============================================================================
# GLOBAL REPLICATION SETTINGS
#=============================================================================

# Master enable/disable for all local replication
# Set to "no" to completely skip replication (destinations ignored)
REPLICATION_ENABLED="no"

# On replication failure:
#   "continue" - Log error, continue to next destination/VM (default)
#   "abort"    - Stop replication entirely (backup still marked successful)
REPLICATION_ON_FAILURE="continue"

# Space check before replication:
#   "skip"     - Skip replication if insufficient space at destination (default)
#   "warn"     - Warn but attempt anyway
#   "disabled" - No space check performed
REPLICATION_SPACE_CHECK="skip"

# Minimum free space percentage required at destination (if SPACE_CHECK enabled)
# Replication skipped/warned if free space below this percentage
REPLICATION_MIN_FREE_PERCENT=10

#=============================================================================
# DESTINATION DEFINITIONS
#
# Each destination is a numbered block (DEST_1, DEST_2, etc.)
# Destinations are processed sequentially in numerical order.
# At least one enabled destination required if REPLICATION_ENABLED="yes"
#
# Common settings for all transports:
#   DEST_N_ENABLED       - "yes" or "no"
#   DEST_N_NAME          - Human-readable name for logs/reports
#   DEST_N_TRANSPORT     - "local" or "ssh"
#   DEST_N_PATH          - Destination path (local/NFS mount or remote path)
#   DEST_N_SYNC_MODE     - "mirror" (rsync --delete) or "accumulate" (no delete)
#   DEST_N_BWLIMIT       - Bandwidth limit in KB/s (0=unlimited)
#   DEST_N_VERIFY        - "none", "size", or "checksum"
#
# Transport-specific settings:
#   SSH: DEST_N_HOST, DEST_N_USER, DEST_N_PORT, DEST_N_SSH_KEY
#   Local: Works with any accessible path (local disk, NFS mount, virtiofs, etc.)
#=============================================================================

#-----------------------------------------------------------------------------
# Destination 1: Local Filesystem Example
# Use for local disks, NFS mounts, or any pre-mounted filesystem
#
# *** YOU MUST CREATE THE DESTINATION DIRECTORY BEFORE ENABLING ***
# rsync will fail if DEST_N_PATH does not exist.
#
# Create and secure the directory:
#   sudo mkdir -p /mnt/backups
#   sudo chown root:backup /mnt/backups
#   sudo chmod 750 /mnt/backups
#
# For NFS mounts: ensure the export allows root write access
# (no_root_squash or map to a backup user).
#-----------------------------------------------------------------------------
#DEST_1_ENABLED="no"
#DEST_1_NAME="local-backup"
#DEST_1_TRANSPORT="local"
#DEST_1_PATH="/mnt/backups"
#DEST_1_SYNC_MODE="mirror"
#DEST_1_BWLIMIT="0"
#DEST_1_VERIFY="size"

#-----------------------------------------------------------------------------
# Destination 2: SSH Example (disabled)
# Rsync over SSH to a remote server
#-----------------------------------------------------------------------------
#DEST_2_ENABLED="no"
#DEST_2_NAME="offsite-ssh"
#DEST_2_TRANSPORT="ssh"
#DEST_2_HOST="backup.example.com"
#DEST_2_USER="backupuser"
#DEST_2_PORT="22"
#DEST_2_PATH="/backups/vms"
#DEST_2_SSH_KEY="/root/.ssh/backup_rsa"
#DEST_2_SYNC_MODE="mirror"
#DEST_2_BWLIMIT="5000"
#DEST_2_VERIFY="size"

#=============================================================================
# END OF CONFIGURATION
#=============================================================================

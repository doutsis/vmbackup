#################################################################################
# VM Exclusion Patterns - TEMPLATE
#
# Pattern-based VM exclusion rules. VMs matching any pattern are excluded.
# Uses bash pattern matching (glob patterns, not regex).
#
# SCHEMA VERSION: 3.1 (2026-02-01)
#################################################################################

#################################################################################
# EXCLUSION PATTERNS
#
# Format: EXCLUDE_PATTERN+=("pattern")
#
# Pattern syntax:
#   *        - Matches any characters
#   ?        - Matches single character
#   [abc]    - Matches any character in brackets
#   [!abc]   - Matches any character NOT in brackets
#
# Examples:
#   "test-*"       - Exclude all VMs starting with "test-"
#   "*-template"   - Exclude all VMs ending with "-template"
#   "dev-*-sandbox" - Exclude dev sandboxes
#   "*backup*"     - Exclude any VM with "backup" in name
#################################################################################

EXCLUDE_PATTERNS=()

# Example patterns (uncomment to use):
# EXCLUDE_PATTERNS+=("test-*")           # Exclude test VMs
# EXCLUDE_PATTERNS+=("*-template")       # Exclude template VMs
# EXCLUDE_PATTERNS+=("*-clone-*")        # Exclude clones
# EXCLUDE_PATTERNS+=("tmp-*")            # Exclude temporary VMs

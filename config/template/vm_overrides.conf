#
# SCHEMA VERSION: 3.1 (2026-02-01)
#################################################################################

#################################################################################
# VM ROTATION POLICIES
#
# Override the default rotation policy for specific VMs.
# Format: VM_POLICY["vm-name"]="policy"
#
# Policies:
#   daily      - Keep RETENTION_DAYS days of backups
#   weekly     - Keep RETENTION_WEEKS weeks of backups
#   monthly    - Keep RETENTION_MONTHS months of backups
#   accumulate - Never auto-delete (for critical VMs)
#   never      - Exclude this VM from backups entirely
#
# Examples:
#   VM_POLICY["production-db"]="accumulate"    # Never delete - critical
#   VM_POLICY["dev-sandbox"]="daily"           # Short retention
#   VM_POLICY["template-vm"]="never"           # Skip backup
#################################################################################

# declare -A VM_POLICY  # Uncomment if not already declared
# VM_POLICY["example-vm"]="monthly"
